name: Update listings

on:
  schedule:
    - cron: "17 11 * * *" # daily ~11:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Regenerate README
        run: node scripts/generate.mjs
      - name: Commit if changed
        run: |
          git config user.name "forgeapply-bot"
          git config user.email "support@forgeapply.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update listings ($(date -u +%F))"
          git push
